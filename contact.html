<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تماس با ما</title>
    <link rel="stylesheet" href="index.css"> <!-- اگر از استایل جدا استفاده می‌کنی -->
</head>
<body>

    <!-- نوار ناوبری -->
    <header>
        <nav>
            <ul>
                <li><a href="index.html">خانه</a></li>
                <li><a href="contact.html">تماس با ما</a></li>
            </ul>
        </nav>
    </header>

    <!-- بخش تماس با ما -->
    <section class="contact">
        <h1>تماس با ما</h1>

        <p>اگر سوالی دارید یا به کمکی نیاز دارید، لطفاً از طریق فرم زیر با ما تماس بگیرید:</p>

        <!-- فرم تماس -->
        <form action="#" method="post">
            <label for="name">نام و نام خانوادگی:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">ایمیل:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">پیام شما:</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">ارسال</button>
        </form>

        <!-- اطلاعات تماس -->
        <div class="contact-info">
            <h2>اطلاعات تماس</h2>
            <p>شماره تماس: 09123456789</p>
            <p>آدرس: تهران، بازار حسن آباد</p>
            <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="450" frameborder="0" style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>

        </div>
    </section>

    <footer>
        <p>&copy; 2025 ایمن بهنام</p>
    </footer>

</body>
</html>
