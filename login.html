<!DOCTYPE html>
<html lang="fa" dir="rtl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>صفحه لاگین</title>

		<link rel="stylesheet" href="index.css" />
	</head>
	<body>
		<div class="login-container">
			<div class="login-card">
				<div class="login-card-body">
					<h5 class="login-card-body-title">ورود به حساب کاربری</h5>

					<form class="login-form">
						<div class="login-email-input">
							<label for="email" class="form-label">ایمیل</label>
							<input type="email" class="form-control" id="email" placeholder="ایمیل خود را وارد کنید" />
						</div>
						<div class="login-email-input">
							<label for="password" class="form-label">رمز عبور</label>
							<input type="password" class="form-control" id="password" placeholder="رمز عبور خود را وارد کنید" />
						</div>

						<div class="login-check-container">
							<div class="inner">
								<input type="checkbox" id="remember" />
								<label class="form-check-label" for="remember">مرا به خاطر بسپار</label>
							</div>
							<a href="#" class="text-decoration-none">فراموشی رمز عبور؟</a>
						</div>
						<button type="submit">ورود</button>
					</form>
				</div>
				<div class="login-footer">
					<p>
						حساب کاربری ندارید؟
						<a href="#" class="text-decoration-none">ثبت‌نام کنید</a>
					</p>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
